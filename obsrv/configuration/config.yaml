            0: {name: 'Gain 1'}
            1: {name: 'Gain 2', gain: 1.00, flags: [ 'default' ]}  # gain source: Wojciech Pych 03-09-2025
            2: {name: 'Gain 3'}
          sky_flats:
            test_exp_time: 1.0  # s
            test_exp_interval: 1.0  # s
            modes:
              g-1_r-3: { test_adu_range: [ 40000, 60000 ], bias_level: 3817}   # ADU
              g-1_r-5: { test_adu_range: [ 40000, 60000 ], bias_level: 2678}   # ADU
            exposure_time_range: [ 10.0, 120.0 ]  # s
            evening_factor: 1.11
            era: 2  # incremented when conditions change, e.g. mirror cleaning
            count: 7 # minimum number of flats to take in specific filter to produce master flat
          dark:
            exposure_time: 60.0  # s  default exp time for DARK frames
            era: 1  # incremented when conditions change, e.g. camera fixes
            count: 7 # minimum number of darks to take in specific filter to produce master dark
          zero:
            exposure_time: 0.1  # s  default exp time for ZERO frames
            era: 1  # incremented when conditions change, e.g. camera fixes
            count: 7 # minimum number of zeros to take in specific filter to produce master zero
            obs_limits: # those values are overridden from global
              weather_restrictions:
                wind:
                  # Values changed on 2025-12
                  observation_stop: 16.0  # m/s
                  pointing: 14.0  # m/s restricts observations towards the wind

