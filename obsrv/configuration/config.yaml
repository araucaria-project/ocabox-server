site:
  global:
    geo_location:
      lon: -70.19638
      lat: -24.59806
      elev: 2817
    obs_limits:  # those values can be overridden by instrument (camera) specific values
      weather_restrictions:
        wind:
          observation_stop: 14.0  # m/s
          pointing: 11.0  # m/s    restricts observations towards the wind
          restricted_pointing_wind_angle: 100.0  # deg  plus minus deg difference of dome azimuth and wind direction
        temperature:
          min: -1.0  # deg C
          max: 30.0  # deg C
        humidity:
          max: 70.0  # %
      ephem:
        sun_altitude: -18.0  # deg
        full_moon_distance: 40.0  # deg

    paths:
      base_fits_dir: /data/fits/
      base_cycle_time_calc_dir: /data/misc/cycle_time_calc
      objects_list_dir: /data/misc/synced/objects_list
    nats:
      host: 127.0.0.1
      port: 4222
      subjects:
        weather: 'telemetry.weather.davis'
        rpc:
          download: 'tic.rpc.{telescope}.download'
          guiding: 'tic.rpc.{telescope}.guiding'
