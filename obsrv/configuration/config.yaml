          temperature_tolerance: [ -5, 5] # +/- deg C
          temperature_range: {'min': -70, 'max': -50}
          camera_kind: 'ccd'
          camera_model: 'Andor iKon-XL 231'
          vertical_shift_speed: 134.49   # us/pixel   # header: CCD-VSSP
#          vertical_shift_speed: 156.89  # us/pixel
          baseline_clamp: False          # header: CCD-BLCL
          sensor_port: "bottom-left" # which amplifier to use: all, bottom-left, bottom-right, top-left, top-right # header: CCD-PORT
          sensor_compensation: False    # header: CCD-SCMP
          readout_modes:
            0: {name: '4MHz 16-bit',    bits: 16, val_mhz: 4.00}
            1: {name: '2MHz 16-bit',    bits: 16, val_mhz: 2.00}
            2: {name: '1MHz 16-bit',    bits: 16, val_mhz: 1.00}
