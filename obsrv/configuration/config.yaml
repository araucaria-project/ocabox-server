# By default this config was called "sample_config"

nats:
  host: "127.0.0.1"
  port: 4222
  streams:
    alpaca_config: "tic.config.observatory"
    plan_stream: "tic.status.{}.program.current"
    status_stream: "tic.status.{}.program.state"

# this configuration and corresponding tree_build.py is compatible with OCABOX version 2
OCABOX_VERSION: "2"

data_collection:
  TreeCCTV:   # Ubiquity CCTV camera
    udm_camera_id: ''
    udm_host: sudm.oca.lan
    udm_port: 443
    udm_user: api
    udm_password: ''

tree:
  wk06:
    observatory:
      comment: Wojtek Krzemiński 0.6m Telescope
      flags: [ 'production', 'dev' ] # telescope is in production mode, available in dev mode also
      lon: -70.20136    # Stefan
      lat: -24.59858
      elev: 2817  # m
      epoch: 2000
      focal_length: 4.2  # m
      focal_ratio: 7.0
      aperture: 0.6  # m
#      mount_type: equatorial
      protocol: alpaca
      address: http://wk06-tcu.oca.lan:11111/api/v1
      style: { color: '#14AD4E' }  # green
      components:
        mount:
          kind: telescope
          device_number: 0
          min_alt: 14.9 # deg
          max_alt: 90.0 # deg
          domeflat_az_offset: 131.0  # deg relative to dome domeflat_az
          domeflat_alt: 15.0  # deg
          obs_min_alt: 35.0 # deg
          park_az:  180.0  # deg
          park_alt: 45.0  # deg
          type: eq
          slew_timeout: 120
        focuser:
          kind: focuser
          device_number: 0
          default_position: 21300
          default_step: 70
          default_seq: 8/V/5
          default_method: lorentzian
          focusing_methods: [ 'lorentzian', 'rms_quad', 'rms', 'ffs_fwhm' ]
          focusing_range: {min: 20000, max: 23000}
          move_tolerance: 5
        dome:
          kind: dome
          device_number: 0
          park_az: 180.0  # deg
          domeflat_az: 49.0  # deg
          slew_tolerance: 3.0 # deg
          follow_tolerance: 3.0 # deg
          slew_timeout: 120
          pointing_params:
            dome_radius: 2050.0  # mm
            spx: -110.0  # mm
            spy: -110.0  # mm
            gem: 670.0  # mm
        covercalibrator:
          kind: covercalibrator
          device_number: 0
        camera:
          kind: camera
          device_number: 0
          address: http://wk06-ccd.oca.lan:11111/api/v1
          resolution: [ 2048, 2048 ]  # pixels
          fov: [ 22.5, 22.5 ] # arcmin
          pixel_scale: 0.66  # arcsec/pixel   # value to be checked
          dither_distance: 8.0  # arcmin
          operation_temperature: -60  # deg C
          temperature_tolerance: [ -5, 5] # +/- deg C
          temperature_range: {'min': -70, 'max': -50} # deg C
          camera_kind: 'ccd'
          camera_model: 'Andor iKon-L 936'
          readout_modes:
            0: {name: '5MHz',    bits: 16, val_mhz: 5.00}
            1: {name: '3MHz',    bits: 16, val_mhz: 3.00}
            2: {name: '1MHz',    bits: 16, val_mhz: 1.00, ron: 10.4, flags: [ 'default' ]}  # flags: default, disabled, ?
            3: {name: '0.05MHz', bits: 16, val_mhz: 0.05, ron: 3.15}   # ron in electrons
          gain_modes:
            0: {name: 'x1', gain: 3.93, saturation: 27000}  # Source: Stefan Kimeswenger
            1: {name: 'x2', gain: 1.92, saturation: 55000}
            2: {name: 'x4', gain: 0.97, saturation: 65535, flags: [ 'default' ]}  # flags: default, disabled, ?
          sky_flats:
            test_exp_time: 1.0  # s
            test_exp_interval: 1.0  # s
            modes:
              g-2_r-2: {test_adu_range: [ 20000, 25000 ], bias_level: 300}   # ADU
              g-2_r-3: {test_adu_range: [ 20000, 25000 ], bias_level: 300}   # ADU
            exposure_time_range: [ 2.0, 120.0 ]  # s
            evening_factor: 1.11
            era: 2  # incremented when conditions change, e.g. mirror cleaning (2025-12-13 mirror cleaning)
            count: 7 # minimum number of flats to take in specific filter to produce master flat
          dark:
            exposure_time: 60.0  # s  default exp time for DARK frames
            era: 0  # incremented when conditions change, e.g. camera fixes
            count: 7 # minimum number of darks to take in specific filter to produce master dark
          zero:
            exposure_time: 0.0  # s  default exp time for ZERO frames
            era: 0  # incremented when conditions change, e.g. camera fixes
            count: 7 # minimum number of zeros to take in specific filter to produce master zero
        guider:
          kind: camera
          device_number: 1
          address: http://wk06-ccd.oca.lan:11111/api/v1
        filterwheel:
          kind: filterwheel
          device_number: 0
          address: http://wk06-ccd.oca.lan:11111/api/v1
          filters:
            - name: u_s
              position: 0
              style: { color: '#4C378C' }
              description: Strömgren u
              focus_offset: 0
              modifier: none
            - name: b_s
              position: 1
              style: { color: '#37738C' }
              description: Strömgren b
              focus_offset: 0
              modifier: none
            - name: v_s
              position: 2
              style: { color: '#37458C' }
              description: Strömgren v
              focus_offset: 0
              modifier: none
            - name: y_s
              position: 3
              description: Strömgren y
              style: { color: '#4F8C37' }
              focus_offset: 0
              modifier: none
            - name: Hb_w
              position: 4
              style: { color: '#FF1500' }
              description: Hb wide
              focus_offset: 0
              modifier: none
            - name: Hb_n
              position: 5
              style: { color: '#B30F00' }
              description: Hb narrow
              focus_offset: 0
              modifier: none
            - name: B
              position: 6
              style: { color: '#627CFC' }
              description: Johnson B
              focus_offset: 0
              modifier: none
            - name: V
              position: 7
              style: { color: '#62FCAA' }
              description: Johnson V
              focus_offset: 0
              modifier: none
            - name: Ic
              position: 8
              style: { color: '#FC62CE' }
              description: Cousins I
              focus_offset: 0
