    TOI_Client:
      ticconnection:
        port: 5559
        url: 127.0.0.1
        protocol: tcp
        timeout: 30
      time_of_data_tolerance: 0.5  # extra, not used by ocabox
      request_timeout: 5.1  # extra, not used by ocabox
