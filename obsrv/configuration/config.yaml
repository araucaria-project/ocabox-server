          planner_command_log: 'tic.status.{telescope}.planner.command.log'
          zero_monitor: 'tic.status.{telescope}.zero_monitor'
        planner:
          data_static: 'tic.planner.{telescope}.data.static'
          data_status: 'tic.planner.{telescope}.data.status'
          data_time: 'tic.planner.{telescope}.data.time'
          status_error: 'tic.planner.{telescope}.status.error'
          status_progress_exposure: 'tic.planner.{telescope}.status.progress.exposure'
          status_progress_readout: 'tic.planner.{telescope}.status.progress.readout'
        # to be continued....

